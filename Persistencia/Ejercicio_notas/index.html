<!DOCTYPE html>
<html>
	<head>
		<title>Ejercicio notas</title>
		<script src="index.js" defer></script>
	</head>

	<body>
		<section>
			<h1>Alumnos y Notas</h1>
			<table>
				<thead>
					<th>ID</th>
					<th>NOMBRE</th>
					<th>CURSO</th>
					<th>MODULO</th>
					<th>NOTA</th>
				</thead>
				<tbody id="table-alumnos">
				</tbody>
			</table>
		</section>

		<section>
			<h3>Añadir alumno</h3>
			<form id="alumnos-form">
				<label for="idAlumno">Id: </label>
				<input type="text" id="idAlumno"></input>

				<br>

				<label for="nombre">Nombre: </label>
				<input type="text" id="nombre"></input>

				<br>

				<label for="curso">Curso: </label>
				<input type="text" id="curso"></input>

				<br>

				<input type="submit"></input>
			</form>
		</section>

	</body>
</html>
